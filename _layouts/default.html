<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #fafafa;
      color: #222;
    }

    header {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    header img {
      height: 40px;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <img src="https://storage.googleapis.com/dbres-assets/email/company_name.png" alt="Logo">
</header>

<main>
  {{ content }}
</main>

</body>
</html>
