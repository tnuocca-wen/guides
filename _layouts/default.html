<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    /* Centered logo header */
    header {
      text-align: center;
      padding: 40px 20px 10px;
    }

    header img {
      width: 280px; /* makes wide logo look better */
      max-width: 90%;
      height: auto;
    }

    /* Paper-like container */
    main {
      max-width: 800px;
      margin: 30px auto 60px;
      padding: 40px 32px;
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    h1, h2, h3 {
      margin-top: 1.2em;
      font-weight: 600;
    }

    p {
      line-height: 1.7;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>

<header>
  <img src="https://storage.googleapis.com/dbres-assets/email/company_name.png" alt="Logo">
</header>

<main>
  {{ content }}
</main>

</body>
</html>
