<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="icon" href="/logo.ico" type="image/x-icon">
  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #ffffff;
      color: #222;
    }

    /* Centered logo */
    header {
      text-align: center;
      padding: 20px 16px 10px;
    }

    header img {
      width: 260px;
      max-width: 90%;
      height: auto;
    }

    /* Compact content */
    main {
      max-width: 760px;
      margin: 10px auto 40px;
      padding: 0 16px;
    }

    h1, h2, h3 {
      color: #0b5394;
      font-weight: 600;
    }
    
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      text-align: center;
    }
    
    h2 {
      font-size: 18px;
      margin-top: 20px;
      margin-bottom: 8px;
    }
    
    h3 {
      font-size: 16px;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    p {
      line-height: 1.5;
      margin: 8px 0;
    }

    ul {
      padding-left: 18px;
      margin: 8px 0;
    }

    li {
      margin: 4px 0;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <img src="https://storage.googleapis.com/dbres-assets/email/company_name.png" alt="Logo">
</header>

<main>
  {{ content }}
</main>

</body>
</html>
